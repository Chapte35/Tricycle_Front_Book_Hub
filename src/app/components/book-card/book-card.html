<mat-card (click)="navigateToDetail()" style="cursor: pointer">
    <img mat-card-image [src]="book.cover" [alt]="book.title" />
    <mat-card-content>
      <mat-card-title>{{ book.title }}</mat-card-title>
      <mat-card-subtitle>{{ book.author }}</mat-card-subtitle>
      <mat-chip-set>
        <span class="state-badge" [ngClass]="badgeClass">{{ badgeLabel }}</span>      </mat-chip-set>
    </mat-card-content>
  </mat-card>
