<div class="image-upload">

    <label for="coverUpload" class="upload-label">
      @if (preview) {
        <img [src]="preview" alt="Prévisualisation"
             style="width: 120px; height: 160px; object-fit: cover; border-radius: 6px; display: block;">
      } @else {
        <div class="upload-placeholder">
          <span><mat-icon style="margin-bottom: -5;">file_upload</mat-icon> Choisir une image</span>
        </div>
      }
    </label>
  
    <input type="file" id="coverUpload" accept="image/*"
           style="display: none;"
           (change)="onFileSelected($event)">
  
    @if (isUploading) {
      <small class="text-muted d-block mt-1">Upload en cours...</small>
    }
  
    @if (errorMessage) {
      <small class="text-danger d-block mt-1">{{ errorMessage }}</small>
    }
  
  </div>
