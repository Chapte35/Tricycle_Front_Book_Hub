<form [formGroup]="form" (ngSubmit)="submit()">

  <div *ngIf="mode === 'register'">
    <input type="text" placeholder="Prénom" formControlName="firstName" />
    <input type="text" placeholder="Nom" formControlName="lastName" />
  </div>

  <input type="email" placeholder="Email" formControlName="email" />
  <input type="password" placeholder="Mot de passe" formControlName="password" />

  <app-button type="submit">
    {{ mode === 'register' ? "S'inscrire" : "Se connecter" }}
  </app-button>

</form>
