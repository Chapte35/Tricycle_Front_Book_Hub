<header class="navbar navbar-expand-lg navbar-light">
  <div class="nameContainer">
    <a routerLink="/">
      <img src="assets/logo.jpg" alt="logo" width="50" height="50" />
    </a>
    <div class="logo">BookHub</div>
  </div>

  <nav>

    <button
      class="navbar-toggler ms-auto"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <!-- dans accueil mettre les infos comme les horaires par ex ... -->
        <!-- <a routerLink="/">Accueil</a> -->
        <li class="nav-item">
          <a class="nav-link active" routerLink="/books">Nos livres</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" routerLink="/myloans" *ngIf="isLoggedIn" >Mes emprunts</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" routerLink="/login" *ngIf="!isLoggedIn">Connexion</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" routerLink="/register" *ngIf="!isLoggedIn">Inscription</a>
        </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="nav-active">Profil</a>
          </li>
        <li class="nav-item">
          <a class="nav-link active"  (click)="logout()" *ngIf="isLoggedIn" style="cursor:pointer">Déconnexion</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
