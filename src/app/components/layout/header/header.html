<header class="navbar navbar-expand-lg" style="background: #efe8db;">
  <div class="container-fluid px-3">

    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/">
      <img src="assets/logo.jpg" alt="logo" width="44" height="44" class="rounded-2" />
      <span class="navbar-title">BookHub</span>
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">

          @if (isLoggedIn) {
          <li class="nav-item">
            <span class="nav-link">Bonjour {{ username }} !</span>
          </li>
        }

        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="nav-active"
             [routerLinkActiveOptions]="{exact: true}">Nos livres</a>
        </li>

        @if (isLoggedIn) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/myloans" routerLinkActive="nav-active">Mes emprunts</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/myreservations" routerLinkActive="nav-active">Mes réservations</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/profile" routerLinkActive="nav-active">Profil</a>
          </li>
        }

        @if (isAdmin) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin" routerLinkActive="nav-active">Administration</a>
          </li>
        }

        @if (!isLoggedIn) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="nav-active">Connexion</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/register" routerLinkActive="nav-active">Inscription</a>
          </li>
        }

        @if (isLoggedIn) {
          <li class="nav-item">
            <button class="logout-btn" (click)="logout()">Déconnexion</button>
          </li>
        }

      </ul>
    </div>
  </div>
</header>
