<div class="card shadow-sm p-3 mb-4">
  <form [formGroup]="form" (ngSubmit)="onSearch()" class="row g-2 align-items-end">

    <div class="col-md-4">
      <label class="form-label">Rechercher</label>
      <input class="form-control" formControlName="query"
             placeholder="Titre, auteur, ISBN...">
    </div>

    <div class="col-md-3">
      <label class="form-label">Catégorie</label>
      <select class="form-select" formControlName="categoryId">
        <option [ngValue]="null">Toutes</option>
        @for (cat of categories; track cat.id) {
          <option [ngValue]="cat.id">{{ cat.libelle }}</option>
        }
      </select>
    </div>

    <div class="col-md-2">
      <label class="form-label">Disponibilité</label>
      <select class="form-select" formControlName="available">
        <option [ngValue]="null">Tous</option>
        <option value="true">Disponible</option>
        <option value="false">Indisponible</option>
      </select>
    </div>

    <div class="col-md-2">
      <label class="form-label">Trier par</label>
      <select class="form-select" formControlName="sort">
        <option value="title">Titre</option>
        <option value="author">Auteur</option>
      </select>
    </div>

    <div class="col-md-1 d-flex gap-2">
      <button type="submit" class="btn btn-primary">Rechercher</button>
      <button type="button" class="btn btn-outline-secondary" (click)="onReset()">✕</button>
    </div>

  </form>
</div>
